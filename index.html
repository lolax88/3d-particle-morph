<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Particle Morph — LIX Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: #fff;
    cursor: crosshair;
  }

  canvas { display: block; }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 2s ease 1s forwards;
  }

  .title h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #8b5cf6 50%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    line-height: 1.1;
  }

  .title p {
    font-size: clamp(0.8rem, 1.5vw, 1.2rem);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .shape-label {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    pointer-events: none;
    font-size: 0.75rem;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }

  .controls {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 2.5s forwards;
  }

  .controls button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 0.5rem 1rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(10px);
    border-radius: 4px;
    transition: all 0.3s ease;
    pointer-events: all;
  }

  .controls button:hover {
    background: rgba(139, 92, 246, 0.2);
    border-color: rgba(139, 92, 246, 0.5);
    color: #fff;
  }

  .controls button.active {
    background: rgba(139, 92, 246, 0.3);
    border-color: #8b5cf6;
    color: #fff;
  }

  .fps {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 20;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.2);
    font-weight: 300;
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeIn 1s ease 3s forwards;
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 5;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="vignette"></div>

<div class="title">
  <h1>LIX STUDIO</h1>
  <p>3D Particle Morph Engine</p>
</div>

<div class="shape-label" id="shapeLabel">● Hover to interact · Click to morph</div>

<div class="controls">
  <button onclick="morphTo('torus')" id="btn-torus">Torus</button>
  <button onclick="morphTo('sphere')" id="btn-sphere">Sphere</button>
  <button onclick="morphTo('knot')" id="btn-knot">Knot</button>
  <button onclick="morphTo('galaxy')" id="btn-galaxy">Galaxy</button>
  <button onclick="morphTo('dna')" id="btn-dna">DNA</button>
  <button onclick="toggleAutoRotate()" id="btn-auto">Auto: ON</button>
</div>

<div class="fps" id="fps">60 FPS</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js';

// ─── Config ───
const PARTICLE_COUNT = 12000;
const MOUSE_FORCE = 0.15;
const RETURN_FORCE = 0.008;
const DAMPING = 0.92;
const MORPH_SPEED = 0.03;
const COLOR_SPEED = 0.0003;

// ─── Setup ───
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const clock = new THREE.Clock();
const mouse = new THREE.Vector2(9999, 9999);
const mouse3D = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

// ─── Particle System ───
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const targets = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const phases = new Float32Array(PARTICLE_COUNT);

// Color palettes
const palettes = {
  default: [
    new THREE.Color('#8b5cf6'),
    new THREE.Color('#06b6d4'),
    new THREE.Color('#f43f5e'),
    new THREE.Color('#10b981'),
    new THREE.Color('#f59e0b'),
  ],
  neon: [
    new THREE.Color('#ff006e'),
    new THREE.Color('#8338ec'),
    new THREE.Color('#3a86ff'),
    new THREE.Color('#06d6a0'),
    new THREE.Color('#ffd166'),
  ]
};

let currentPalette = palettes.default;
let autoRotate = true;
let currentShape = 'torus';

// Initialize random positions
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  positions[i3] = (Math.random() - 0.5) * 10;
  positions[i3 + 1] = (Math.random() - 0.5) * 10;
  positions[i3 + 2] = (Math.random() - 0.5) * 10;
  velocities[i3] = 0;
  velocities[i3 + 1] = 0;
  velocities[i3 + 2] = 0;
  sizes[i] = Math.random() * 2 + 0.5;
  phases[i] = Math.random() * Math.PI * 2;

  const color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
  colors[i3] = color.r;
  colors[i3 + 1] = color.g;
  colors[i3 + 2] = color.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Custom shader
const vertexShader = `
  attribute float size;
  varying vec3 vColor;
  varying float vAlpha;

  void main() {
    vColor = color;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    float dist = length(mvPosition.xyz);
    vAlpha = smoothstep(20.0, 2.0, dist);
    gl_PointSize = size * (300.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragmentShader = `
  varying vec3 vColor;
  varying float vAlpha;

  void main() {
    vec2 uv = gl_PointCoord - 0.5;
    float d = length(uv);
    if (d > 0.5) discard;

    float glow = exp(-d * 4.0);
    float core = smoothstep(0.15, 0.0, d);
    float alpha = (glow * 0.6 + core * 0.4) * vAlpha;

    gl_FragColor = vec4(vColor * (glow + core * 1.5), alpha);
  }
`;

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {},
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// ─── Background particles ───
const bgCount = 500;
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(bgCount * 3);
const bgCol = new Float32Array(bgCount * 3);
const bgSiz = new Float32Array(bgCount);

for (let i = 0; i < bgCount; i++) {
  bgPos[i * 3] = (Math.random() - 0.5) * 30;
  bgPos[i * 3 + 1] = (Math.random() - 0.5) * 30;
  bgPos[i * 3 + 2] = (Math.random() - 0.5) * 30;
  bgSiz[i] = Math.random() * 1.5 + 0.3;
  const c = new THREE.Color().setHSL(Math.random(), 0.3, 0.3);
  bgCol[i * 3] = c.r;
  bgCol[i * 3 + 1] = c.g;
  bgCol[i * 3 + 2] = c.b;
}

bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
bgGeo.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
bgGeo.setAttribute('size', new THREE.BufferAttribute(bgSiz, 1));

const bgMat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const bgPoints = new THREE.Points(bgGeo, bgMat);
scene.add(bgPoints);

// ─── Shape Generators ───
function genTorus(i, total) {
  const angle = (i / total) * Math.PI * 2;
  const ring = (i % 300) / 300 * Math.PI * 2;
  const R = 1.8;
  const r = 0.6 + Math.sin(ring * 8) * 0.15;
  return new THREE.Vector3(
    (R + r * Math.cos(ring)) * Math.cos(angle),
    (R + r * Math.cos(ring)) * Math.sin(angle),
    r * Math.sin(ring)
  );
}

function genSphere(i, total) {
  const phi = Math.acos(1 - 2 * (i + 0.5) / total);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  const r = 1.8 + Math.sin(phi * 6) * 0.1;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}

function genKnot(i, total) {
  const t = (i / total) * Math.PI * 2 * 3;
  const p = 2, q = 3;
  const r = 0.8 + Math.sin(t * 5) * 0.1;
  const s = 1.5;
  return new THREE.Vector3(
    s * (Math.cos(q * t) * (1 + r * Math.cos(p * t))),
    s * (Math.sin(q * t) * (1 + r * Math.cos(p * t))),
    s * r * Math.sin(p * t)
  );
}

function genGalaxy(i, total) {
  const arm = i % 3;
  const dist = (i / total) * 3;
  const angle = dist * 2 + arm * (Math.PI * 2 / 3);
  const spread = 0.1 + dist * 0.15;
  return new THREE.Vector3(
    dist * Math.cos(angle) + (Math.random() - 0.5) * spread,
    (Math.random() - 0.5) * spread * 0.3,
    dist * Math.sin(angle) + (Math.random() - 0.5) * spread
  );
}

function genDNA(i, total) {
  const t = (i / total) * Math.PI * 8;
  const strand = i % 2;
  const r = 1.2;
  const y = (i / total - 0.5) * 6;
  return new THREE.Vector3(
    r * Math.cos(t + strand * Math.PI),
    y,
    r * Math.sin(t + strand * Math.PI)
  );
}

const shapeGenerators = { torus: genTorus, sphere: genSphere, knot: genKnot, galaxy: genGalaxy, dna: genDNA };

// ─── Generate targets ───
function setShape(name) {
  const gen = shapeGenerators[name];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = gen(i, PARTICLE_COUNT);
    targets[i * 3] = p.x;
    targets[i * 3 + 1] = p.y;
    targets[i * 3 + 2] = p.z;
  }
  currentShape = name;
  document.getElementById('shapeLabel').textContent = `● ${name.toUpperCase()} · ${PARTICLE_COUNT.toLocaleString()} particles`;
}

// Initial shape
setShape('torus');

// ─── Morph trigger ───
window.morphTo = function(name) {
  setShape(name);
  // Update button states
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + name);
  if (btn) btn.classList.add('active');
};

window.toggleAutoRotate = function() {
  autoRotate = !autoRotate;
  document.getElementById('btn-auto').textContent = `Auto: ${autoRotate ? 'ON' : 'OFF'}`;
  document.getElementById('btn-auto').classList.toggle('active', autoRotate);
};

// Click to cycle shapes
const shapeList = ['torus', 'sphere', 'knot', 'galaxy', 'dna'];
let shapeIndex = 0;

canvas.addEventListener('click', () => {
  shapeIndex = (shapeIndex + 1) % shapeList.length;
  morphTo(shapeList[shapeIndex]);
});

// ─── Mouse ───
canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersect = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersect);
  if (intersect) mouse3D.copy(intersect);
});

canvas.addEventListener('mouseleave', () => {
  mouse3D.set(9999, 9999, 9999);
});

// Touch
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(t.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersect = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersect);
  if (intersect) mouse3D.copy(intersect);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouse3D.set(9999, 9999, 9999);
});

// ─── FPS counter ───
let frameCount = 0;
let lastFpsTime = 0;

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = Math.min(clock.getDelta(), 0.05);

  // FPS
  frameCount++;
  if (time - lastFpsTime > 0.5) {
    const fps = Math.round(frameCount / (time - lastFpsTime));
    document.getElementById('fps').textContent = `${fps} FPS`;
    frameCount = 0;
    lastFpsTime = time;
  }

  // Auto color shift
  const hueShift = time * COLOR_SPEED;

  // Update particles
  const pos = geometry.attributes.position.array;
  const col = geometry.attributes.color.array;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;

    // Spring toward target
    const dx = targets[i3] - pos[i3];
    const dy = targets[i3 + 1] - pos[i3 + 1];
    const dz = targets[i3 + 2] - pos[i3 + 2];

    velocities[i3] += dx * MORPH_SPEED;
    velocities[i3 + 1] += dy * MORPH_SPEED;
    velocities[i3 + 2] += dz * MORPH_SPEED;

    // Mouse repulsion
    const mx = pos[i3] - mouse3D.x;
    const my = pos[i3 + 1] - mouse3D.y;
    const mz = pos[i3 + 2] - mouse3D.z;
    const md = Math.sqrt(mx * mx + my * my + mz * mz);

    if (md < 1.5) {
      const force = (1.5 - md) * MOUSE_FORCE;
      velocities[i3] += (mx / md) * force;
      velocities[i3 + 1] += (my / md) * force;
      velocities[i3 + 2] += (mz / md) * force;
    }

    // Damping
    velocities[i3] *= DAMPING;
    velocities[i3 + 1] *= DAMPING;
    velocities[i3 + 2] *= DAMPING;

    // Apply velocity
    pos[i3] += velocities[i3];
    pos[i3 + 1] += velocities[i3 + 1];
    pos[i3 + 2] += velocities[i3 + 2];

    // Subtle floating
    pos[i3] += Math.sin(time * 0.5 + phases[i]) * 0.001;
    pos[i3 + 1] += Math.cos(time * 0.3 + phases[i] * 1.3) * 0.001;
  }

  // Rotate
  if (autoRotate) {
    points.rotation.y += 0.002;
    points.rotation.x = Math.sin(time * 0.1) * 0.1;
  }

  // Background drift
  bgPoints.rotation.y += 0.0005;
  bgPoints.rotation.x += 0.0002;

  geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Start ───
animate();

// Initial morph animation (start from center)
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  positions[i3] = (Math.random() - 0.5) * 0.5;
  positions[i3 + 1] = (Math.random() - 0.5) * 0.5;
  positions[i3 + 2] = (Math.random() - 0.5) * 0.5;
}

// Set first button active
document.getElementById('btn-torus').classList.add('active');
</script>

</body>
</html>
